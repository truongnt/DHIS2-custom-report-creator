[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test tiers — run a single tier with: pytest -m e2e   (see docs/TESTING_PROCESS.md)
markers =
    unit: pure-logic tests, no Qt/browser (fast)
    integration: drive real Qt widgets via pytest-qt qtbot
    e2e: render preview HTML in a headless browser, assert behavior + save evidence

# Show skip/xfail reasons; quiet dots otherwise
addopts = -ra

# When pytest-qt is installed (integration tier), uncomment to bind PySide6:
# qt_api = pyside6
